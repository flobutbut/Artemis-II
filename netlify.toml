[build]
  command = "npm run build"
  publish = "dist"

# CORS-free proxy to Horizons API (same path as Vite in dev).
[[redirects]]
  from = "/jpl-horizons"
  to = "https://ssd.jpl.nasa.gov/api/horizons.api"
  status = 200
  force = true

[[redirects]]
  from = "/nasa-missions-blog-feed"
  to = "https://www.nasa.gov/blogs/missions/feed/"
  status = 200
  force = true
